<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>在线备忘录</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <h1>📒 在线备忘录</h1>

        <!-- 搜索 -->
        <div class="panel">
            <input id="search" placeholder="搜索笔记..." />
            <input id="tag-filter" placeholder="标签过滤（逗号分隔）" />
            <button onclick="loadNotes()">搜索</button>
        </div>

        <!-- 编辑区 -->
        <div class="panel">
            <input id="title" placeholder="输入标题..." />
            <textarea id="content" placeholder="开始写点什么..." rows="4"></textarea>
            <input id="tags" placeholder="标签（如：学习,生活）" />
            <input type="datetime-local" id="remindTime" />

            <div class="actions">
                <button onclick="addNote()">新增</button>
                <button id="update-btn" onclick="updateNote()" style="display:none;">保存</button>
            </div>
        </div>

        <!-- 笔记列表 -->
        <div id="notes"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
